apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: umbrella
  namespace: argocd
spec:
  source:
    helm:
      valuesObject:
        global:
          env: test
          domain: test.net
          tlsSecret: tls-test-net-wildcard
        mailu:
          nodeHosts: |
            10.11.3.11 k3s-control
            10.11.3.12 k3s-worker-1
            10.11.3.13 k3s-worker-2
            10.11.3.14 k3s-worker-3
          hostnames: [mail.test.net]
          ingress:
            existingSecret: tls-test-net-wildcard
        postgresql:
          pgadminHost: pgadmin.test.net
          customPgadmin:
            ingress:
              host: pgadmin.test.net
              tlsSecretName: tls-test-net-wildcard
        certa:
          domain: test.net
          certa:
            ingress:
              tls:
                - hosts: ["certa.test.net"]
                  secretName: tls-test-net-wildcard
          postgresql:
            enabled: false
        sins:
          haproxyIp: "10.11.3.17"
          webui:
            ingress:
              hosts:
                - host: "ns.test.net"
                  paths: [{ path: "/", pathType: Prefix }]
              tls:
                - hosts: ["ns.test.net"]
                  secretName: tls-test-net-wildcard
          postgresql:
            enabled: false
        rancher:
          hostname: rancher.test.net
        githubRunner:
          group: k3s-test
          labels:
            - k3s
            - k3s-test
        freeipa:
          hostname: ipa.test.net
          realm: TEST.NET
          domain: test.net
          credentialsSecret: freeipa-credentials
          ingressTlsSecret: tls-test-net-wildcard
        keycloak-operator:
          hostname: auth.test.net
          tlsSecret: tls-test-net-wildcard
        harbor:
          expose:
            ingress:
              hosts:
                core: harbor.test.net
            tls:
              secret:
                secretName: tls-test-net-wildcard
        gitea:
          ingress:
            hosts:
              - host: gitea.test.net
                paths: [{ path: "/" }]
            tls:
              - secretName: tls-test-net-wildcard
                hosts: [gitea.test.net]
        rabbitmq:
          ingress:
            hosts:
              - host: rabbitmq.test.net
                paths: [{ path: "/", pathType: Prefix }]
            tls:
              - secretName: tls-test-net-wildcard
                hosts: [rabbitmq.test.net]
        redisinsight:
          ingress:
            hosts:
              - host: redis.test.net
                paths: [{ path: "/", pathType: ImplementationSpecific }]
            tls:
              - secretName: tls-test-net-wildcard
                hosts: [redis.test.net]
        sonarqube:
          ingress:
            hosts:
              - name: sonar.test.net
            tls:
              - secretName: tls-test-net-wildcard
                hosts: [sonar.test.net]
        langflow:
          ingress:
            hosts:
              - host: langflow.test.net
                paths: []
            tls:
              - secretName: tls-test-net-wildcard
                hosts: [langflow.test.net]
        ollama:
          webui:
            ingress:
              hosts:
                - host: ollama.test.net
                  paths: [{ path: "/", pathType: Prefix }]
              tls:
                - hosts: [ollama.test.net]
                  secretName: tls-test-net-wildcard
