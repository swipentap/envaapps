# Deploys umbrella Helm chart from Unbrella repo (creates child apps).
# Charts release workflow updates umbrella values with new chart versions and pushes to Unbrella. Helm values patched per env by overlays.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: umbrella
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://swipentap.github.io/Umbrella
    chart: enva-umbrella
    targetRevision: "1.0.0-292"
    helm:
      valuesObject:
        freeipaChartRevision: "1.0.8-289"
        langflowChartRevision: "0.1.0-289"
        vaultSecretsChartRevision: "0.1.0-289"
        global:
          env: prod
          domain: prod.net
          tlsSecret: tls-prod-net-wildcard
        mailu:
          nodeHosts: |
            10.11.2.11 k3s-control
            10.11.2.12 k3s-worker-1
            10.11.2.13 k3s-worker-2
            10.11.2.14 k3s-worker-3
          hostnames: [mail.prod.net]
          ingress:
            enabled: true
            ingressClassName: traefik
            existingSecret: tls-prod-net-wildcard
        postgresql:
          pgadminHost: pgadmin.prod.net
          customPgadmin:
            ingress:
              enabled: true
              host: pgadmin.prod.net
              tlsSecretName: tls-prod-net-wildcard
        certa:
          domain: prod.net
          certa:
            ingress:
              enabled: true
              className: traefik
              tls:
                - hosts: ["certa.prod.net"]
                  secretName: tls-prod-net-wildcard
          postgresql:
            enabled: false
        sins:
          haproxyIp: "10.11.2.17"
          webui:
            ingress:
              enabled: true
              className: traefik
              hosts:
                - host: "ns.prod.net"
                  paths: [{ path: "/", pathType: Prefix }]
              tls:
                - hosts: ["ns.prod.net"]
                  secretName: tls-prod-net-wildcard
          postgresql:
            enabled: false
        rancher:
          hostname: rancher.prod.net
        vault:
          url: "http://10.11.1.8:30200"
          kubeAuthPath: "kubernetes"
          role: "external-secrets"
        githubRunner:
          group: k3s-prod
          labels:
            - k3s
            - k3s-prod
        freeipa:
          hostname: ipa.prod.net
          realm: PROD.NET
          domain: prod.net
          credentialsSecret: freeipa-credentials
          ingressTlsSecret: tls-prod-net-wildcard
        keycloak-operator:
          hostname: auth.prod.net
          tlsSecret: tls-prod-net-wildcard
        harbor:
          expose:
            type: ingress
            ingress:
              hosts:
                core: harbor.prod.net
            tls:
              enabled: true
              certSource: secret
              secret:
                secretName: tls-prod-net-wildcard
        gitea:
          ingress:
            enabled: true
            className: traefik
            hosts:
              - host: gitea.prod.net
                paths: [{ path: "/" }]
            tls:
              - secretName: tls-prod-net-wildcard
                hosts: [gitea.prod.net]
        rabbitmq:
          ingress:
            enabled: true
            className: traefik
            hosts:
              - host: rabbitmq.prod.net
                paths: [{ path: "/", pathType: Prefix }]
            tls:
              - secretName: tls-prod-net-wildcard
                hosts: [rabbitmq.prod.net]
        redisinsight:
          ingress:
            enabled: true
            className: traefik
            hosts:
              - host: redis.prod.net
                paths: [{ path: "/", pathType: ImplementationSpecific }]
            tls:
              - secretName: tls-prod-net-wildcard
                hosts: [redis.prod.net]
        sonarqube:
          ingress:
            enabled: true
            ingressClassName: traefik
            hosts:
              - name: sonar.prod.net
            tls:
              - secretName: tls-prod-net-wildcard
                hosts: [sonar.prod.net]
        langflow:
          ingress:
            enabled: true
            hosts:
              - host: langflow.prod.net
                paths: []
            tls:
              - secretName: tls-prod-net-wildcard
                hosts: [langflow.prod.net]
        ollama:
          webui:
            ingress:
              enabled: true
              className: traefik
              hosts:
                - host: ollama.prod.net
                  paths: [{ path: "/", pathType: Prefix }]
              tls:
                - hosts: [ollama.prod.net]
                  secretName: tls-prod-net-wildcard
  destination:
    server: https://kubernetes.default.svc
    namespace: enva
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - Prune=true
